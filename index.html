  .legend-item:hover { border-color: #444; }

  .legend-dot {

  }

    padding: 6px 14px;

    display: flex;
    align-items: center;
  }

  .timeline-container {
    position: relative;
    height: 500px;
    min-width: 100%;
  }

  /* ── Central Line ── */
  .central-line {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #333 2%, #333 98%, transparent);
    transform: translateY(-50%);

  .phase-marker {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 5;
  }
  .phase-line {
    position: absolute;
    top: -200px;
    width: 1px;
    height: 400px;
    background: linear-gradient(180deg, transparent, rgba(255,107,53,0.3), transparent);

    position: absolute;
    bottom: -240px;
    left: 50%;
    transform: translateX(-50%);

    font-size: 11px;
    font-weight: 700;
    color: #ff6b35;
    letter-spacing: 1px;
    opacity: 0.6;

    top: 50%;
    transform: translateY(-50%);
    z-index: 3;

    position: absolute;
    top: -8px;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 20px;
    font-weight: 900;
    color: #2a2a35;
    letter-spacing: 3px;

    position: absolute;
    z-index: 10;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .event-node:hover {
    z-index: 50;
    transform: scale(1.05);
  }

  .event-stem {
    position: absolute;
    left: 50%;
    width: 2px;
    background: linear-gradient(180deg, var(--node-color), transparent);
    transform: translateX(-50%);
  }
  .event-node.above .event-stem {
    bottom: 0;
    transform-origin: bottom;
  }
  .event-node.below .event-stem {
    top: 0;
    transform-origin: top;
    background: linear-gradient(0deg, var(--node-color), transparent);
  }

  .event-dot {
    position: absolute;
    left: 50%;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--node-color);
    transform: translate(-50%, -50%);
    box-shadow: 0 0 12px var(--node-color);
    transition: all 0.3s;

    width: 16px;
    height: 16px;
    box-shadow: 0 0 24px var(--node-color);

    width: 20px;
    height: 20px;
    box-shadow: 0 0 30px var(--node-color), 0 0 60px var(--node-color);
    animation: pulse 2s ease-in-out infinite;
  }

    width: 24px;
    height: 24px;
  }

  .event-node.below .event-card { top: 100%; margin-top: 8px; }

    color: #666;
    font-weight: 300;
    margin-bottom: 4px;

  .event-title {

    font-weight: 500;
    line-height: 1.5;
    color: #e8e8e8;

    color: #fff;

  .scroll-hint {

    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: #444;

    0%, 70% { opacity: 1; }
    100% { opacity: 0; }

  const d = new Date(dateStr);
  return ((d - startDate) / (1000 * 60 * 60 * 24)) * PX_PER_DAY;
}

];
phases.forEach(p => {
  const x = dayOffset(p.date);
  const el = document.createElement('div');
  el.className = 'phase-marker';
  el.style.left = x + 'px';
  el.innerHTML = `<div class="phase-line"></div><div class="phase-label">${p.label}</div>`;
  timeline.appendChild(el);
});

// ── Track vertical slots to avoid overlap ──
// Group events by proximity and alternate above/below
let toggleSide = true;
const usedSlots = { above: [], below: [] };

function findSlot(x, side) {
  const slots = usedSlots[side];
  // Check minimum horizontal spacing
  for (const slot of slots) {
    if (Math.abs(slot.x - x) < 110) {
      return false;
    }
  }
  return true;
}

// Sort events by date
events.sort((a, b) => new Date(a.date) - new Date(b.date));

// ── Create event nodes ──
events.forEach((evt, i) => {
  const x = dayOffset(evt.date);
  const isTurning = evt.impact === 'ターニングポイント';
  const color = COLORS[evt.domain] || '#666';

  // Determine side: alternate, but check for space
  let side;
  if (findSlot(x, toggleSide ? 'above' : 'below')) {
    side = toggleSide ? 'above' : 'below';
  } else if (findSlot(x, toggleSide ? 'below' : 'above')) {
    side = toggleSide ? 'below' : 'above';
  } else {
    side = toggleSide ? 'above' : 'below';
  }
  toggleSide = !toggleSide;

  // Vary stem length to reduce overlap
  const baseLen = isTurning ? 100 : 60;
  const jitter = (i % 4) * 25;
  const stemLen = baseLen + jitter;

  usedSlots[side].push({ x, stemLen });

  const node = document.createElement('div');
  node.className = `event-node ${side} ${isTurning ? 'turning-point' : ''}`;
  node.dataset.domain = evt.domain;
  node.dataset.impact = evt.impact;
  node.style.setProperty('--node-color', color);
  node.style.left = x + 'px';

  if (side === 'above') {
    node.style.top = `calc(50% - ${stemLen}px)`;
    node.style.height = stemLen + 'px';
  } else {
    node.style.top = '50%';
    node.style.height = stemLen + 'px';
  }

  const dateStr = evt.date.replace(/^\d{4}-/, '').replace('-', '/');

  node.innerHTML = `
    <div class="event-stem" style="height:${stemLen}px"></div>
    <div class="event-dot" style="${side === 'above' ? 'bottom:0' : 'top:0'}"></div>
    <div class="event-card">
      <div class="event-date">${dateStr}</div>
      <div class="event-title">${evt.title}</div>
      ${isTurning ? '<div class="event-badge">TURNING POINT</div>' : ''}
      ${evt.memo ? `<div class="event-memo">${evt.memo}</div>` : ''}
    </div>
  `;

  timeline.appendChild(node);
});

// ── Legend ──
const activeDomains = new Set(Object.keys(COLORS));
Object.entries(COLORS).forEach(([domain, color]) => {
  // Only show domains that have events
  if (!events.some(e => e.domain === domain)) return;
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.dataset.domain = domain;
  item.innerHTML = `<span class="legend-dot" style="background:${color}"></span>${domain}`;
  item.addEventListener('click', () => {
    if (activeDomains.has(domain)) {
      activeDomains.delete(domain);
      item.classList.add('inactive');
    } else {
      activeDomains.add(domain);
      item.classList.remove('inactive');
    }
    filterEvents();
  });
  legendEl.appendChild(item);
});

// ── Filtering ──
let currentFilter = 'all';

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    filterEvents();
  });
});

function filterEvents() {
  document.querySelectorAll('.event-node').forEach(node => {
    const domain = node.dataset.domain;
    const impact = node.dataset.impact;
    let show = activeDomains.has(domain);

    if (currentFilter === 'turning') show = show && impact === 'ターニングポイント';
    else if (currentFilter === 'forward') show = show && impact === '前進';

    node.classList.toggle('hidden', !show);
  });
}

// ── Horizontal scroll with mouse wheel ──
const wrap = document.getElementById('timelineWrap');
wrap.addEventListener('wheel', (e) => {
  if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
    e.preventDefault();
    wrap.scrollLeft += e.deltaY;
  }
}, { passive: false });

// ── Start scrolled to beginning ──
wrap.scrollLeft = 0;
</script>
</body>
</html>
