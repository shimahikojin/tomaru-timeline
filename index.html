    font-weight: 300;
  }

  /* ── Legend ── */
  .legend {
    position: fixed;

    z-index: 100;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    max-width: 500px;
    justify-content: flex-end;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #999;
    cursor: pointer;
    padding: 4px 10px;

  .legend-item:hover { border-color: #ccc; }
  .legend-item.inactive { opacity: 0.3; }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Filter ── */
  .filter-bar {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    gap: 8px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    padding: 8px 16px;
    border-radius: 30px;
    border: 1px solid #e0e0e0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .filter-btn {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid #ddd;
    background: transparent;
    color: #666;
    cursor: pointer;

    border-color: #ff6b35;
    color: #fff;

  .timeline-wrap {
    height: 100vh;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 100px 80px 80px;
    display: flex;
    align-items: center;
  }

  .timeline-container {
    position: relative;
    height: 500px;
    min-width: 100%;
  }

  /* ── Central Line ── */
  .central-line {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #d0d0d0 2%, #d0d0d0 98%, transparent);
    transform: translateY(-50%);
  }

  /* ── Phase markers ── */
  .phase-marker {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 5;
  }
  .phase-line {
    position: absolute;
    top: -200px;
    width: 1px;
    height: 400px;
    background: linear-gradient(180deg, transparent, rgba(255,107,53,0.3), transparent);

    position: absolute;
    bottom: -240px;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-size: 11px;
    font-weight: 700;
    color: #ff6b35;
    letter-spacing: 1px;
    opacity: 0.6;
  }

  .month-marker {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 3;
  }
  .month-label {
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 20px;
    font-weight: 900;
    color: #e8e5e0;
    letter-spacing: 3px;
  }

  /* ── Event nodes ── */
  .event-node {
    position: absolute;
    z-index: 10;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .event-node:hover {
    z-index: 50;
    transform: scale(1.05);
  }

  .event-stem {
    position: absolute;
    left: 50%;
    width: 2px;
    background: linear-gradient(180deg, var(--node-color), transparent);
    transform: translateX(-50%);
  }
  .event-node.above .event-stem {
    bottom: 0;
    transform-origin: bottom;
  }
  .event-node.below .event-stem {
    top: 0;
    transform-origin: top;
    background: linear-gradient(0deg, var(--node-color), transparent);
  }

  .event-dot {
    position: absolute;
    left: 50%;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--node-color);
    transform: translate(-50%, -50%);
    box-shadow: 0 0 12px var(--node-color);
    transition: all 0.3s;
  }
  .event-node:hover .event-dot {
    width: 16px;
    height: 16px;
    box-shadow: 0 0 24px var(--node-color);
  }

  .event-node.turning-point .event-dot {
    width: 20px;
    height: 20px;
    box-shadow: 0 0 30px var(--node-color), 0 0 60px var(--node-color);
    animation: pulse 2s ease-in-out infinite;
  }
  .event-node.turning-point:hover .event-dot {
    width: 24px;
    height: 24px;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 20px var(--node-color), 0 0 40px rgba(255,107,53,0); }
    50% { box-shadow: 0 0 30px var(--node-color), 0 0 60px var(--node-color); }
  }

    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    padding: 10px 14px;
    background: rgba(255, 255, 255, 0.97);
    border: 1px solid var(--node-color);
    border-radius: 12px;
    backdrop-filter: blur(8px);
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    transition: all 0.3s;
  }
  .event-node:hover .event-card {
    background: rgba(255, 255, 255, 1);
    box-shadow: 0 4px 20px rgba(0,0,0,0.12), 0 0 0 1px var(--node-color);
  }
  .event-node.above .event-card { bottom: 100%; margin-bottom: 8px; }
  .event-node.below .event-card { top: 100%; margin-top: 8px; }

  .event-date {
    font-size: 10px;
    color: #666;
    font-weight: 300;
    margin-bottom: 4px;
  }
  .event-title {
    font-size: 12px;
    font-weight: 500;
    line-height: 1.5;
    color: #37352f;
  }
  .event-node.turning-point .event-title {
    font-weight: 700;
    color: #1a1a1a;
  }

    font-size: 9px;
    padding: 2px 8px;
    border-radius: 10px;
    margin-top: 6px;

    opacity: 0;
    pointer-events: none;

    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);

    color: #bbb;

    0%, 70% { opacity: 1; }
    100% { opacity: 0; }

// ── Compute layout ──
const startDate = new Date('2025-11-15');
const endDate = new Date('2026-06-28');
const totalDays = (endDate - startDate) / (1000 * 60 * 60 * 24);
const PX_PER_DAY = 22;
const totalWidth = totalDays * PX_PER_DAY;

const timeline = document.getElementById('timeline');
const legendEl = document.getElementById('legend');
timeline.style.width = totalWidth + 'px';

function dayOffset(dateStr) {
  const d = new Date(dateStr);
  return ((d - startDate) / (1000 * 60 * 60 * 24)) * PX_PER_DAY;
}

// ── Draw month markers ──
const months = [
  { date: '2025-12-01', label: '12月' },
  { date: '2026-01-01', label: '1月' },
  { date: '2026-02-01', label: '2月' },
  { date: '2026-03-01', label: '3月' },
  { date: '2026-04-01', label: '4月' },
  { date: '2026-05-01', label: '5月' },
  { date: '2026-06-01', label: '6月' }
];
months.forEach(m => {
  const x = dayOffset(m.date);
  const el = document.createElement('div');
  el.className = 'month-marker';
  el.style.left = x + 'px';
  el.innerHTML = `<div class="month-label">${m.label}</div>`;
  timeline.appendChild(el);
});

// ── Draw phase markers ──
const phases = [
  { date: '2025-11-29', label: '① 模索期' },
  { date: '2025-12-18', label: '② ホテル突破' },
  { date: '2026-01-05', label: '③ 検証への道' },
  { date: '2026-02-01', label: '④ チーム形成' },
  { date: '2026-03-08', label: '⑤ 実行開始' },
];
phases.forEach(p => {
  const x = dayOffset(p.date);
  const el = document.createElement('div');
  el.className = 'phase-marker';
  el.style.left = x + 'px';
  el.innerHTML = `<div class="phase-line"></div><div class="phase-label">${p.label}</div>`;
  timeline.appendChild(el);
});

// ── Track vertical slots to avoid overlap ──
// Group events by proximity and alternate above/below
let toggleSide = true;
const usedSlots = { above: [], below: [] };

function findSlot(x, side) {
  const slots = usedSlots[side];
  // Check minimum horizontal spacing
  for (const slot of slots) {
    if (Math.abs(slot.x - x) < 110) {
      return false;
    }
  }
  return true;
}

// Sort events by date
events.sort((a, b) => new Date(a.date) - new Date(b.date));

// ── Create event nodes ──
events.forEach((evt, i) => {
  const x = dayOffset(evt.date);
  const isTurning = evt.impact === 'ターニングポイント';
  const color = COLORS[evt.domain] || '#666';

  // Determine side: alternate, but check for space
  let side;
  if (findSlot(x, toggleSide ? 'above' : 'below')) {
    side = toggleSide ? 'above' : 'below';
  } else if (findSlot(x, toggleSide ? 'below' : 'above')) {
    side = toggleSide ? 'below' : 'above';
  } else {
    side = toggleSide ? 'above' : 'below';
  }
  toggleSide = !toggleSide;

  // Vary stem length to reduce overlap
  const baseLen = isTurning ? 100 : 60;
  const jitter = (i % 4) * 25;
  const stemLen = baseLen + jitter;

  usedSlots[side].push({ x, stemLen });

  const node = document.createElement('div');
  node.className = `event-node ${side} ${isTurning ? 'turning-point' : ''}`;
  node.dataset.domain = evt.domain;
  node.dataset.impact = evt.impact;
  node.style.setProperty('--node-color', color);
  node.style.left = x + 'px';

  if (side === 'above') {
    node.style.top = `calc(50% - ${stemLen}px)`;
    node.style.height = stemLen + 'px';
  } else {
    node.style.top = '50%';
    node.style.height = stemLen + 'px';
  }

  const dateStr = evt.date.replace(/^\d{4}-/, '').replace('-', '/');

  node.innerHTML = `
    <div class="event-stem" style="height:${stemLen}px"></div>
    <div class="event-dot" style="${side === 'above' ? 'bottom:0' : 'top:0'}"></div>
    <div class="event-card">
      <div class="event-date">${dateStr}</div>
      <div class="event-title">${evt.title}</div>
      ${isTurning ? '<div class="event-badge">TURNING POINT</div>' : ''}
      ${evt.memo ? `<div class="event-memo">${evt.memo}</div>` : ''}
    </div>
  `;

  timeline.appendChild(node);
});

// ── Legend ──
const activeDomains = new Set(Object.keys(COLORS));
Object.entries(COLORS).forEach(([domain, color]) => {
  // Only show domains that have events
  if (!events.some(e => e.domain === domain)) return;
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.dataset.domain = domain;
  item.innerHTML = `<span class="legend-dot" style="background:${color}"></span>${domain}`;
  item.addEventListener('click', () => {
    if (activeDomains.has(domain)) {
      activeDomains.delete(domain);
      item.classList.add('inactive');
    } else {
      activeDomains.add(domain);
      item.classList.remove('inactive');
    }
    filterEvents();
  });
  legendEl.appendChild(item);
});

// ── Filtering ──
let currentFilter = 'all';

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    filterEvents();
  });
});

function filterEvents() {
  document.querySelectorAll('.event-node').forEach(node => {
    const domain = node.dataset.domain;
    const impact = node.dataset.impact;
    let show = activeDomains.has(domain);

    if (currentFilter === 'turning') show = show && impact === 'ターニングポイント';
    else if (currentFilter === 'forward') show = show && impact === '前進';

    node.classList.toggle('hidden', !show);
  });
}

// ── Horizontal scroll with mouse wheel ──
const wrap = document.getElementById('timelineWrap');
wrap.addEventListener('wheel', (e) => {
  if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
    e.preventDefault();
    wrap.scrollLeft += e.deltaY;
  }
}, { passive: false });

// ── Start scrolled to beginning ──
wrap.scrollLeft = 0;
</script>
</body>
</html>
